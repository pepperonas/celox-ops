server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # KI-Lead-Suche kann (v. a. mit Web-Suche) länger laufen → großzügigeres Timeout,
    # sonst 504 obwohl der Backend-Lauf serverseitig fertig wird. Muss VOR /api/ stehen.
    location /api/rainmaker/discover/ai/ {
        proxy_pass http://backend:8000/api/rainmaker/discover/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
    }

    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
