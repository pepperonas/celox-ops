server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Dockers eingebettetes DNS. Zusammen mit den Variablen in proxy_pass unten
    # löst nginx die Upstreams **pro Request** neu auf, statt die Container-IP beim
    # Start einmal zu cachen. Wird ein Container neu gebaut (neue IP), findet nginx
    # ihn sofort — ohne Restart. Das beseitigt die 502-Fenster nach jedem Deploy
    # (früher: nginx zeigte auf die tote alte IP → 502, bis es neu gestartet wurde).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # KI-Lead-Suche kann (v. a. mit Web-Suche) länger laufen → großzügigeres Timeout,
    # sonst 504 obwohl der Backend-Lauf serverseitig fertig wird. Muss VOR /api/ stehen.
    location /api/rainmaker/discover/ai/ {
        set $backend_ai backend;
        proxy_pass http://$backend_ai:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/ {
        set $backend_up backend;
        proxy_pass http://$backend_up:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
    }

    location / {
        set $frontend_up frontend;
        proxy_pass http://$frontend_up:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
