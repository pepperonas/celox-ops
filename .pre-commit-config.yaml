# Pre-commit hooks: install via `pip install pre-commit && pre-commit install`
# Runs lint + type-check before each commit.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        files: ^backend/
        args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: tsc
        name: TypeScript Type-Check (frontend)
        entry: bash -c "cd frontend && npx tsc --noEmit"
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: no-secrets
        name: Block accidentally committed secrets
        entry: scripts/check-no-secrets.sh
        language: system
        files: \.(env|sh|md|txt|json|yaml|yml)$
