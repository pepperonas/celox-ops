server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gehashte Build-Assets: NIE aufs SPA-Fallback zurückfallen — ein fehlender
    # Chunk (alter Hash nach Deploy) muss 404 liefern, nicht index.html.
    # Sonst cachen Browser/Service-Worker HTML unter der .js-URL
    # ("Expected a JavaScript module ... MIME type text/html").
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
