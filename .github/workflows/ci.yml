name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Ruff lint
        run: ruff check backend/
      - name: Smoke import — all routers
        env:
          DATABASE_URL: postgresql+asyncpg://x:x@localhost/x
          JWT_SECRET: ci-test-jwt-secret-with-at-least-32-characters
          ADMIN_USERNAME: admin
          CORS_ORIGINS: http://localhost
        run: |
          cd backend
          python -c "from app.routers.search import router; from app.routers.invoices import router; from app.routers.dashboard import router; from app.routers.attachments import router; from app.routers.ical import router; print('OK')"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit
      - name: Build
        run: cd frontend && npm run build
